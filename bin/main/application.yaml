spring:
  application:
    name: workit

  datasource:
    url: ${SPRING_DATASOURCE_URL:${DB_URL:jdbc:mysql://localhost:3307/workit_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true}}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:workit}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:1013}}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

  sql:
    init:
      mode: always

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  default-consumes-media-type: application/json
  default-produces-media-type: application/json

workit:
  jwt:
    secret: workit-dev-secret-key-min-256-bits-for-hs256
    expiration-ms: 86400000
  google:
    client-id: 882310203258-5t7q6ps3a45b7vfhe3cme9fs09bd7g28.apps.googleusercontent.com
  apple:
    client-id:
  image:
    upload-dir: uploads/images

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
